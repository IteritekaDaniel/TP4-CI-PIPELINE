name: CI
On :
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  Workflow_dispatch:

Lint :
  runs-on: ubuntu-latest
  steps:
    - name: Recuperer le code
      uses: actions/checkout@v4

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Installer les dépendances
      run: pip install -r requirements.txt
    - name: Installer l'outil flake8
      run: pip install flake8
    - name: Executer lint sur App et tests
      run: |
        flake8 app --count --select=E9,F63,F7,F82,F842 --show-source --statistics
        flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
        flake8 tests --count --max-line-length=127 --statistics

Test :
  runs-on: ubuntu-latest
  needs: Lint
  steps:
    - name: Installer dependances
      run: pip install -r requirements.txt
    - name: Executer pytest avec couverture
      run: python -m pytest -v --cov=src
 
build :
  runs-on: ubuntu-latest
  needs: Test
  steps:
    - name: Generer le package Python
      run: python -m build
    - name: Apload du resulat comme artifact
      uses: actions/upload-artifact@v3
      with:
        name: package-python
     

      
      