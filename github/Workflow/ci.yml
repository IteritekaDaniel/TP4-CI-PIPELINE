name: CI
On :
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  Workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout
      
      - name: Installer Python
        uses: actions/setup-python
        with:
          python-version: '3.11'
      
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      
      - name: Lint le code
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F842 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
      
      - name: Lancer les tests
        run: pytest -v --cov=app

        


      
      